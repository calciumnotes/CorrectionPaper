<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcium Notes</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

    <button class="read-mode-trigger" onclick="openReadMode()">📖 Read Mode</button>

    <div class="page">
        <div class="logo">
            <model-viewer class="floating-logo" src="./logo.glb" auto-rotate camera-controls disable-zoom 
                style="width: 95%; max-width: 650px; height: 400px;"></model-viewer>
        </div>

        <div class="button">
            <a href="#">EXAM</a>
            <a href="#">NOTES</a>
            <a href="#">RESOURCES</a>
        </div>

        <div class="motivation-box">
            <p id="motivationText"><span id="quote"></span><br><span id="motivationAuthor"></span></p>
        </div>

        <div class="notice">
            <h1>IMPORTANT NOTICE</h1>
            <p>Calcium Notes provides lucid workbooks for students.</p>
        </div>
    </div>

    <div id="readModeOverlay">
        <div class="rm-header">
            <div class="rm-brand">📖 Calcium Read Mode</div>
            <button onclick="closeReadMode()" style="background:red; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">✕ Exit</button>
        </div>
        <div class="rm-body">
            <div class="rm-panel">🕐 Clock: <span id="rmClock">00:00</span></div>
            <div class="rm-panel">⏱ Timer: <span id="timerDisp">25:00</span><br>
                <button onclick="timerStart()">Start</button>
            </div>
            <div class="rm-panel">🔔 Alarms: 
                <input type="time" id="alTime"> <button onclick="alarmAdd()">Set</button>
                <div id="alarmList"></div>
            </div>
            <div class="rm-panel" style="grid-column: span 2;">✅ Tasks:
                <input type="text" id="tkInput" onkeydown="if(event.key==='Enter'){event.preventDefault(); taskAdd();}">
                <button onclick="taskAdd()">Add</button>
                <div id="taskList"></div>
            </div>
        </div>
    </div>

    <div class="alarm-toast" id="alarmToast">
        <div class="toast-icon">🔔</div>
        <div class="toast-body">
            <h4 id="toastTitle" style="margin:0; color:#93c5fd;">Alarm!</h4>
            <p id="toastLabel" style="margin:2px 0 0; font-size:0.8rem; color:#64748b;">Time's up.</p>
        </div>
        <button class="toast-dismiss" onclick="toastDismiss()">Dismiss</button>
    </div>

    <script>
        let audioCtx = null;
        const overlay = document.getElementById("readModeOverlay");

        function openReadMode() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            overlay.classList.add("rm-active");
            setTimeout(() => overlay.classList.add("rm-visible"), 10);
            document.body.style.overflow = "hidden";
        }

        function closeReadMode() {
            overlay.classList.remove("rm-visible");
            setTimeout(() => { overlay.classList.remove("rm-active"); document.body.style.overflow = ""; }, 350);
        }

        // Timer Logic
        let timerLeft = 1500, timerIv = null;
        function timerStart() {
            if(timerIv) return;
            timerIv = setInterval(() => {
                timerLeft--;
                const m = Math.floor(timerLeft/60), s = timerLeft%60;
                document.getElementById("timerDisp").textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if(timerLeft <= 0) { clearInterval(timerIv); timerIv = null; toastShow("Time Up!", "Break time."); beep(); }
            }, 1000);
        }

        // Toast Fix Logic
        function toastShow(title, label) {
            const toast = document.getElementById("alarmToast");
            document.getElementById("toastTitle").textContent = title;
            document.getElementById("toastLabel").textContent = label;
            
            toast.style.display = "flex"; // Force it to exist
            setTimeout(() => { toast.classList.add("show"); }, 10);
        }

        function toastDismiss() {
            const toast = document.getElementById("alarmToast");
            toast.classList.remove("show");
            setTimeout(() => { toast.style.display = "none"; }, 400);
        }

        function beep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        // Quotes
        window.onload = () => {
            document.getElementById("quote").textContent = "Success is consistency.";
            document.getElementById("motivationAuthor").textContent = "— Calcium Notes";
        };
    </script>
</body>
</html>
